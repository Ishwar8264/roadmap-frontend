<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="420" fill="#0f172a"/>

  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="28" font-family="Arial" font-weight="bold">
    TypeScript Interface
  </text>

  <text x="450" y="80" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Arial">
    Interface defines the shape of an object
  </text>

  <rect x="70" y="120" width="300" height="220" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
  <text x="220" y="155" text-anchor="middle" fill="#38bdf8" font-size="22" font-family="Arial" font-weight="bold">
    interface User
  </text>

  <text x="105" y="200" fill="#e2e8f0" font-size="18" font-family="monospace">id: string</text>
  <text x="105" y="235" fill="#e2e8f0" font-size="18" font-family="monospace">name: string</text>
  <text x="105" y="270" fill="#e2e8f0" font-size="18" font-family="monospace">email: string</text>
  <text x="105" y="305" fill="#e2e8f0" font-size="18" font-family="monospace">isActive: boolean</text>

  <line x1="390" y1="230" x2="500" y2="230" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="445" y="215" text-anchor="middle" fill="#cbd5e1" font-size="15" font-family="Arial">
    used by
  </text>

  <rect x="530" y="120" width="300" height="220" rx="18" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
  <text x="680" y="155" text-anchor="middle" fill="#22c55e" font-size="22" font-family="Arial" font-weight="bold">
    const user
  </text>

  <text x="565" y="200" fill="#e2e8f0" font-size="18" font-family="monospace">id: "1"</text>
  <text x="565" y="235" fill="#e2e8f0" font-size="18" font-family="monospace">name: "Ishwar"</text>
  <text x="565" y="270" fill="#e2e8f0" font-size="18" font-family="monospace">email: "..."</text>
  <text x="565" y="305" fill="#e2e8f0" font-size="18" font-family="monospace">isActive: true</text>

  <rect x="250" y="365" width="400" height="35" rx="10" fill="#334155"/>
  <text x="450" y="388" text-anchor="middle" fill="#f8fafc" font-size="16" font-family="Arial">
    If object shape is wrong, TypeScript shows an error
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>