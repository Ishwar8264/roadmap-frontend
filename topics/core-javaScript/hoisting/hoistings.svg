<svg width="920" height="620" viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="620" fill="#f8fafc"/>

  <text x="460" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">JavaScript Global Scope, Hoisting &amp; TDZ</text>
  <text x="460" y="72" text-anchor="middle" font-size="15" fill="#475569">var, let, and const can be global, but behave differently before initialization</text>

  <rect x="60" y="105" width="800" height="430" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="460" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Global Scope</text>

  <rect x="95" y="170" width="360" height="310" rx="14" fill="#0f172a"/>

  <text x="120" y="205" font-size="14" fill="#94a3b8" font-family="monospace">Before declaration</text>
  <text x="120" y="235" font-size="14" fill="#22c55e" font-family="monospace">console.log(a) - undefined</text>
  <text x="120" y="260" font-size="14" fill="#ef4444" font-family="monospace">console.log(b) - ReferenceError</text>
  <text x="120" y="285" font-size="14" fill="#ef4444" font-family="monospace">console.log(c) - ReferenceError</text>

  <text x="120" y="330" font-size="14" fill="#94a3b8" font-family="monospace">Declarations</text>
  <text x="120" y="360" font-size="14" fill="#38bdf8" font-family="monospace">var a = 10</text>
  <text x="120" y="385" font-size="14" fill="#f59e0b" font-family="monospace">let b = 20</text>
  <text x="120" y="410" font-size="14" fill="#a78bfa" font-family="monospace">const c = 30</text>

  <rect x="505" y="170" width="305" height="75" rx="14" fill="#dcfce7" stroke="#16a34a"/>
  <text x="657" y="198" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">var</text>
  <text x="657" y="222" text-anchor="middle" font-size="14" fill="#334155">Hoisted and initialized as undefined</text>

  <rect x="505" y="270" width="305" height="75" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="657" y="298" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">let</text>
  <text x="657" y="322" text-anchor="middle" font-size="14" fill="#334155">Hoisted but stays in TDZ</text>

  <rect x="505" y="370" width="305" height="75" rx="14" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="657" y="398" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">const</text>
  <text x="657" y="422" text-anchor="middle" font-size="14" fill="#334155">Hoisted but stays in TDZ</text>

  <rect x="210" y="505" width="500" height="72" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="460" y="533" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">TDZ = Temporal Dead Zone</text>
  <text x="460" y="558" text-anchor="middle" font-size="14" fill="#334155">Before let/const initialization, access gives ReferenceError</text>
</svg>