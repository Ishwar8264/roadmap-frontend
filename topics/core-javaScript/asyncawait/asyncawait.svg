<svg width="960" height="640" viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="640" fill="#f8fafc"/>

  <text x="480" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">
    async / await Flow
  </text>

  <text x="480" y="72" text-anchor="middle" font-size="15" fill="#475569">
    Write async code in a synchronous style
  </text>

  <!-- async function -->
  <rect x="280" y="110" width="400" height="80" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="480" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    async function getData()
  </text>

  <!-- await fetch -->
  <rect x="280" y="230" width="400" height="80" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="480" y="265" text-anchor="middle" font-size="18" fill="#0f172a">
    await fetch()
  </text>
  <text x="480" y="290" text-anchor="middle" font-size="14" fill="#334155">
    waits for Promise
  </text>

  <!-- arrow -->
  <line x1="480" y1="190" x2="480" y2="230" stroke="#64748b" stroke-width="3"/>

  <!-- response -->
  <rect x="280" y="350" width="400" height="80" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="480" y="385" text-anchor="middle" font-size="18" fill="#0f172a">
    Response received
  </text>

  <line x1="480" y1="310" x2="480" y2="350" stroke="#64748b" stroke-width="3"/>

  <!-- await json -->
  <rect x="280" y="470" width="400" height="80" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="480" y="505" text-anchor="middle" font-size="18" fill="#0f172a">
    await res.json()
  </text>
  <text x="480" y="530" text-anchor="middle" font-size="14" fill="#334155">
    convert to data
  </text>

  <line x1="480" y1="430" x2="480" y2="470" stroke="#64748b" stroke-width="3"/>

  <!-- footer -->
  <rect x="220" y="580" width="520" height="40" rx="12" fill="#0f172a"/>
  <text x="480" y="605" text-anchor="middle" font-size="14" fill="#22c55e" font-family="monospace">
    async/await makes async code easier to read and maintain
  </text>
</svg>