<svg width="920" height="540" viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="540" fill="#f8fafc"/>

  <text x="460" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">
    ES6+ Core Features
  </text>

  <text x="460" y="72" text-anchor="middle" font-size="15" fill="#475569">
    Modern JavaScript improvements for clean and safe code
  </text>

  <!-- let const -->
  <rect x="80" y="120" width="240" height="130" rx="16" fill="#dcfce7" stroke="#16a34a"/>
  <text x="200" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    let / const
  </text>
  <text x="200" y="180" text-anchor="middle" font-size="14" fill="#334155">
    Block scoped
  </text>
  <text x="200" y="205" text-anchor="middle" font-size="14" fill="#334155">
    TDZ supported
  </text>
  <text x="200" y="230" text-anchor="middle" font-size="14" fill="#334155">
    Safer than var
  </text>

  <!-- Arrow -->
  <rect x="340" y="120" width="240" height="130" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    Arrow Function
  </text>
  <text x="460" y="180" text-anchor="middle" font-size="14" fill="#334155">
    Short syntax
  </text>
  <text x="460" y="205" text-anchor="middle" font-size="14" fill="#334155">
    No own this
  </text>
  <text x="460" y="230" text-anchor="middle" font-size="14" fill="#334155">
    Used in React
  </text>

  <!-- Template -->
  <rect x="600" y="120" width="240" height="130" rx="16" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="720" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    Template Literals
  </text>
  <text x="720" y="180" text-anchor="middle" font-size="14" fill="#334155">
    Backticks `
  </text>
  <text x="720" y="205" text-anchor="middle" font-size="14" fill="#334155">
    ${} variables
  </text>
  <text x="720" y="230" text-anchor="middle" font-size="14" fill="#334155">
    Multiline support
  </text>

  <!-- Code box -->
  <rect x="160" y="300" width="600" height="140" rx="16" fill="#0f172a"/>

  <text x="180" y="335" font-size="14" fill="#22c55e" font-family="monospace">
    const user = "Ishwar";
  </text>
  <text x="180" y="360" font-size="14" fill="#38bdf8" font-family="monospace">
    const greet = () =&gt; `Hello ${user}`;
  </text>
  <text x="180" y="385" font-size="14" fill="#f59e0b" font-family="monospace">
    console.log(greet());
  </text>

</svg>