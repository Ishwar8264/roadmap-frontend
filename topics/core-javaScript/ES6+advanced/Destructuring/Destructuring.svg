<svg width="920" height="560" viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="560" fill="#f8fafc"/>

  <text x="460" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">
    JavaScript Destructuring
  </text>
  <text x="460" y="72" text-anchor="middle" font-size="15" fill="#475569">
    Extract values from objects and arrays into variables
  </text>

  <!-- Object Destructuring -->
  <rect x="70" y="115" width="360" height="320" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="250" y="150" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">
    Object Destructuring
  </text>

  <rect x="105" y="180" width="290" height="120" rx="12" fill="#0f172a"/>
  <text x="125" y="210" font-size="14" fill="#22c55e" font-family="monospace">const user = {</text>
  <text x="145" y="235" font-size="14" fill="#22c55e" font-family="monospace">name: "Ishwar",</text>
  <text x="145" y="260" font-size="14" fill="#22c55e" font-family="monospace">age: 25</text>
  <text x="125" y="285" font-size="14" fill="#22c55e" font-family="monospace">};</text>

  <text x="250" y="335" text-anchor="middle" font-size="20" font-weight="700" fill="#334155">↓</text>

  <rect x="105" y="355" width="290" height="55" rx="12" fill="#0f172a"/>
  <text x="125" y="388" font-size="14" fill="#38bdf8" font-family="monospace">const { name, age } = user;</text>

  <!-- Array Destructuring -->
  <rect x="490" y="115" width="360" height="320" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="670" y="150" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">
    Array Destructuring
  </text>

  <rect x="525" y="180" width="290" height="90" rx="12" fill="#0f172a"/>
  <text x="545" y="215" font-size="14" fill="#22c55e" font-family="monospace">const skills = ["JS", "React"];</text>
  <text x="545" y="245" font-size="14" fill="#94a3b8" font-family="monospace">// index based</text>

  <text x="670" y="315" text-anchor="middle" font-size="20" font-weight="700" fill="#334155">↓</text>

  <rect x="525" y="335" width="290" height="75" rx="12" fill="#0f172a"/>
  <text x="545" y="365" font-size="14" fill="#38bdf8" font-family="monospace">const [first, second] = skills;</text>
  <text x="545" y="390" font-size="14" fill="#f59e0b" font-family="monospace">first → "JS"</text>

  <!-- Footer -->
  <rect x="110" y="470" width="700" height="55" rx="14" fill="#0f172a"/>
  <text x="460" y="503" text-anchor="middle" font-size="15" fill="#ffffff">
    Object destructuring uses property names. Array destructuring uses index positions.
  </text>
</svg>