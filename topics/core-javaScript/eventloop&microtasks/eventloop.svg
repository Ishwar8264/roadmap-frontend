<svg width="1200" height="780" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="780" fill="#f8fafc"/>

  <text x="600" y="45" text-anchor="middle" font-size="32" font-weight="700" fill="#0f172a">
    JavaScript Event Loop Animation
  </text>
  <text x="600" y="78" text-anchor="middle" font-size="16" fill="#475569">
    Sync code first, then microtasks, then callback queue
  </text>

  <!-- Boxes -->
  <rect x="80" y="160" width="260" height="300" rx="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="210" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Call Stack</text>
  <text x="210" y="235" text-anchor="middle" font-size="15" fill="#334155">runs sync code</text>

  <rect x="460" y="160" width="260" height="300" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="590" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Web APIs</text>
  <text x="590" y="235" text-anchor="middle" font-size="15" fill="#334155">fetch, timer, DOM</text>

  <rect x="860" y="120" width="280" height="140" rx="20" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="1000" y="165" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Microtask Queue</text>
  <text x="1000" y="195" text-anchor="middle" font-size="15" fill="#334155">Promise.then</text>
  <text x="1000" y="220" text-anchor="middle" font-size="15" fill="#334155">async/await</text>

  <rect x="860" y="330" width="280" height="140" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="1000" y="375" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Callback Queue</text>
  <text x="1000" y="405" text-anchor="middle" font-size="15" fill="#334155">Macrotasks</text>
  <text x="1000" y="430" text-anchor="middle" font-size="15" fill="#334155">setTimeout, events</text>

  <rect x="440" y="575" width="320" height="110" rx="24" fill="#0f172a"/>
  <text x="600" y="620" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">Event Loop</text>
  <text x="600" y="650" text-anchor="middle" font-size="15" fill="#cbd5e1">microtasks first</text>
  <text x="600" y="670" text-anchor="middle" font-size="15" fill="#cbd5e1">callback queue second</text>

  <!-- Paths -->
  <path id="syncPath" d="M210 520 L210 460" fill="none" stroke="#0284c7" stroke-width="4"/>
  <path id="apiPath" d="M340 310 L460 310" fill="none" stroke="#16a34a" stroke-width="4"/>
  <path id="microPath" d="M720 230 L860 190" fill="none" stroke="#8b5cf6" stroke-width="4"/>
  <path id="callbackPath" d="M720 370 L860 400" fill="none" stroke="#ef4444" stroke-width="4"/>
  <path id="microToLoopPath" d="M1000 260 L760 575" fill="none" stroke="#8b5cf6" stroke-width="4"/>
  <path id="callbackToLoopPath" d="M1000 470 L760 655" fill="none" stroke="#ef4444" stroke-width="4"/>
  <path id="loopToStackPath" d="M440 635 L210 460" fill="none" stroke="#64748b" stroke-width="4"/>

  <!-- Labels -->
  <text x="95" y="510" font-size="14" font-weight="700" fill="#0284c7">1. sync code enters stack</text>
  <text x="360" y="295" font-size="14" font-weight="700" fill="#16a34a">2. async task goes to Web APIs</text>
  <text x="750" y="175" font-size="14" font-weight="700" fill="#8b5cf6">3. promise result</text>
  <text x="750" y="420" font-size="14" font-weight="700" fill="#ef4444">4. timer callback</text>
  <text x="790" y="540" font-size="14" font-weight="700" fill="#8b5cf6">5. microtasks first</text>
  <text x="800" y="705" font-size="14" font-weight="700" fill="#ef4444">6. callbacks after</text>
  <text x="245" y="590" font-size="14" font-weight="700" fill="#64748b">7. back to stack</text>

  <!-- Moving dots -->
  <circle r="10" fill="#0284c7">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#syncPath"/>
    </animateMotion>
  </circle>

  <circle r="10" fill="#16a34a">
    <animateMotion dur="2.5s" begin="0.4s" repeatCount="indefinite">
      <mpath href="#apiPath"/>
    </animateMotion>
  </circle>

  <circle r="10" fill="#8b5cf6">
    <animateMotion dur="2.8s" begin="0.8s" repeatCount="indefinite">
      <mpath href="#microPath"/>
    </animateMotion>
  </circle>

  <circle r="10" fill="#ef4444">
    <animateMotion dur="2.8s" begin="1.1s" repeatCount="indefinite">
      <mpath href="#callbackPath"/>
    </animateMotion>
  </circle>

  <circle r="10" fill="#8b5cf6">
    <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite">
      <mpath href="#microToLoopPath"/>
    </animateMotion>
  </circle>

  <circle r="10" fill="#ef4444">
    <animateMotion dur="3s" begin="2.1s" repeatCount="indefinite">
      <mpath href="#callbackToLoopPath"/>
    </animateMotion>
  </circle>

  <circle r="10" fill="#64748b">
    <animateMotion dur="3s" begin="2.7s" repeatCount="indefinite">
      <mpath href="#loopToStackPath"/>
    </animateMotion>
  </circle>

  <!-- Footer -->
  <rect x="180" y="720" width="840" height="44" rx="14" fill="#0f172a"/>
  <text x="600" y="748" text-anchor="middle" font-size="15" fill="#22c55e" font-family="monospace">
    Final Order: Sync Code - Microtasks - Callback Queue
  </text>
</svg>